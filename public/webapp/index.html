<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virtual Cards Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #0f172a);
            --text-color: var(--tg-theme-text-color, #f8fafc);
            --hint-color: var(--tg-theme-hint-color, #94a3b8);
            --button-color: var(--tg-theme-button-color, #3b82f6);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --card-bg: #1e293b;
            --border-color: #334155;
            --success-color: #22c55e;
            --danger-color: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 80px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .balance-card {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            border-radius: 20px;
            padding: 24px;
            color: #fff;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
            margin-bottom: 24px;
        }

        .balance-title {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .btn {
            background-color: var(--button-color);
            color: var(--button-text-color);
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
            box-sizing: border-box;
            text-decoration: none;
            display: inline-block;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.15);
            margin-top: 8px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .card-item, .tx-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-number {
            font-family: monospace;
            font-size: 16px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .card-info, .tx-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--hint-color);
        }

        .tx-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-color);
        }

        .tx-amount {
            font-weight: 700;
            font-size: 15px;
        }

        .tx-amount.positive {
            color: var(--success-color);
        }

        .tx-amount.negative {
            color: var(--text-color);
        }

        .tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 100;
        }

        .tab {
            background: none;
            border: none;
            color: var(--hint-color);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tab.active {
            color: var(--button-color);
            font-weight: 600;
        }

        .hidden {
            display: none !important;
        }

        .amounts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .amount-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .amount-btn.selected {
            border-color: var(--button-color);
            background-color: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <!-- Главная вкладка -->
        <div id="tab-home" class="view">
            <div class="header">
                <h2>💳 Virtual Cards</h2>
                <span id="username" style="font-size: 14px; color: var(--hint-color);">User</span>
            </div>

            <div class="balance-card">
                <div class="balance-title">Ваш баланс</div>
                <div class="balance-amount" id="user-balance">$0.00</div>
                <button class="btn btn-secondary" onclick="switchTab('deposit', event)">💎 Пополнить через Tonkeeper</button>
            </div>

            <button class="btn" onclick="buyCard()">💳 Купить карту ($10)</button>
        </div>

        <!-- Вкладка карт -->
        <div id="tab-cards" class="view hidden">
            <div class="section-title">Мои виртуальные карты</div>
            <div id="cards-list">
                <p style="color: var(--hint-color); text-align: center;">Загрузка карт...</p>
            </div>
        </div>

        <!-- Вкладка истории транзакций -->
        <div id="tab-history" class="view hidden">
            <div class="section-title">История транзакций</div>
            <div id="transactions-list">
                <p style="color: var(--hint-color); text-align: center;">Загрузка истории...</p>
            </div>
        </div>

        <!-- Вкладка пополнения -->
        <div id="tab-deposit" class="view hidden">
            <div class="section-title">Пополнение баланса</div>
            <p style="color: var(--hint-color); font-size: 14px; margin-bottom: 16px;">Выберите сумму пополнения в USDT / USD:</p>
            
            <div class="amounts-grid">
                <div class="amount-btn selected" onclick="selectAmount(10, this)">$10</div>
                <div class="amount-btn" onclick="selectAmount(25, this)">$25</div>
                <div class="amount-btn" onclick="selectAmount(50, this)">$50</div>
            </div>

            <div id="deposit-info" style="background: var(--card-bg); padding: 16px; border-radius: 16px; margin-bottom: 16px;">
                <p style="margin: 0 0 8px 0; font-size: 14px;">К оплате: <strong id="pay-ton">~6.84 TON</strong></p>
                <p style="margin: 0; font-size: 12px; color: var(--hint-color);">Курс: 1 USD = 0.6839 TON</p>
            </div>

            <a id="pay-button" href="#" target="_blank" class="btn">Оплатить в Tonkeeper</a>
        </div>
    </div>

    <!-- Навигация снизу -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('home', event)">
            <span>🏠</span> Главная
        </button>
        <button class="tab" onclick="switchTab('cards', event)">
            <span>💳</span> Карты
        </button>
        <button class="tab" onclick="switchTab('history', event)">
            <span>📜</span> История
        </button>
        <button class="tab" onclick="switchTab('deposit', event)">
            <span>💎</span> Пополнить
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentUserId = tg.initDataUnsafe?.user?.id || "8041683307";
        document.getElementById('username').innerText = tg.initDataUnsafe?.user?.first_name || "Клиент";

        let selectedUsd = 10;
        const tonRate = 0.6839;
        const walletAddress = "UQCrU8nLAToxmsNeTaz8yWm2nHa0hjvbKYIVRxjN";

        function switchTab(tabName, event) {
            document.querySelectorAll('.view').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');

            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }

            if (tabName === 'cards') {
                loadCards();
            }
            if (tabName === 'history') {
                loadTransactions();
            }
            if (tabName === 'home') {
                loadProfile();
            }
        }

        function selectAmount(amount, el) {
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            selectedUsd = amount;

            const tonAmount = (amount * tonRate).toFixed(2);
            document.getElementById('pay-ton').innerText = `~${tonAmount} TON`;

            const nanoTon = Math.floor(tonAmount * 1e9);
            const memo = `DEP-${currentUserId}-${Math.random().toString(36).substring(2, 7).toUpperCase()}`;
            const url = `https://app.tonkeeper.com/transfer/${walletAddress}?amount=${nanoTon}&text=${encodeURIComponent(memo)}`;
            
            document.getElementById('pay-button').href = url;
        }

        async function loadProfile() {
            try {
                const response = await fetch(`/api/user/${currentUserId}`);
                const result = await response.json();
                if (result.success && result.data) {
                    document.getElementById('user-balance').innerText = `$${parseFloat(result.data.balanceUSD).toFixed(2)}`;
                }
            } catch (e) {
                console.error("Ошибка загрузки профиля", e);
            }
        }

        async function loadCards() {
            const list = document.getElementById('cards-list');
            list.innerHTML = '<p style="color: var(--hint-color); text-align: center;">Загрузка карт...</p>';
            
            try {
                // Карты пользователя грузим через профиль или отдельный эндпоинт, 
                // если нужно, запросим профиль в котором есть счетчик карт, либо выведем заглушку
                const response = await fetch(`/api/user/${currentUserId}`);
                const result = await response.json();

                // Для демонстрации возьмем данные из базы или покажем статус
                list.innerHTML = `
                    <div class="card-item">
                        <div class="card-info"><span>Virtual Visa</span><span>🟢 Активна</span></div>
                        <div class="card-number">4000 **** **** 4815</div>
                        <div class="card-info"><span>Баланс: $5.00</span><span>CVV: ***</span></div>
                    </div>
                `;
            } catch (e) {
                list.innerHTML = '<p style="color: var(--hint-color); text-align: center;">Не удалось загрузить карты</p>';
            }
        }

        async function loadTransactions() {
            const list = document.getElementById('transactions-list');
            list.innerHTML = '<p style="color: var(--hint-color); text-align: center;">Загрузка истории...</p>';
            
            try {
                const response = await fetch(`/api/transactions/${currentUserId}`);
                const result = await response.json();

                if (!result.success || !result.data || result.data.length === 0) {
                    list.innerHTML = '<p style="color: var(--hint-color); text-align: center;">История транзакций пуста</p>';
                    return;
                }

                list.innerHTML = '';
                result.data.forEach(tx => {
                    const isPositive = tx.amount > 0;
                    const sign = isPositive ? '+' : '';
                    const amountClass = isPositive ? 'positive' : 'negative';
                    const dateFormatted = new Date(tx.date).toLocaleString();

                    list.innerHTML += `
                        <div class="tx-item">
                            <div class="tx-info">
                                <span class="tx-title">${tx.title}</span>
                                <span class="tx-amount ${amountClass}">${sign}$${Math.abs(tx.amount).toFixed(2)}</span>
                            </div>
                            <div class="tx-info" style="font-size: 12px;">
                                <span>Статус: ${tx.status}</span>
                                <span>${dateFormatted}</span>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                list.innerHTML = '<p style="color: var(--hint-color); text-align: center;">Не удалось загрузить историю</p>';
            }
        }

        function buyCard() {
            tg.showConfirm("Купить виртуальную карту за $10 с вашего баланса?", async (confirmed) => {
                if (confirmed) {
                    try {
                        const res = await fetch('/api/cards/buy', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ telegramId: currentUserId, cardPrice: 10.00 })
                        });
                        const data = await res.json();
                        if (data.success) {
                            tg.showAlert("Карта успешно создана!");
                            loadProfile();
                        } else {
                            tg.showAlert(data.message || "Недостаточно средств на балансе");
                        }
                    } catch (err) {
                        tg.showAlert("Ошибка при покупке карты");
                    }
                }
            });
        }

        loadProfile();
        selectAmount(10, document.querySelector('.amount-btn'));
    </script>
</body>
</html>
