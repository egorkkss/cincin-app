<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virtual Cards Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #0f172a);
            --text-color: var(--tg-theme-text-color, #f8fafc);
            --hint-color: var(--tg-theme-hint-color, #94a3b8);
            --button-color: var(--tg-theme-button-color, #3b82f6);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --card-bg: #1e293b;
            --border-color: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 80px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .balance-card {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            border-radius: 20px;
            padding: 24px;
            color: #fff;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
            margin-bottom: 24px;
        }

        .balance-title {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .btn {
            background-color: var(--button-color);
            color: var(--button-text-color);
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
            box-sizing: border-box;
            text-decoration: none;
            display: inline-block;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.15);
            margin-top: 8px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .card-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-number {
            font-family: monospace;
            font-size: 16px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .card-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--hint-color);
        }

        .tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
        }

        .tab {
            background: none;
            border: none;
            color: var(--hint-color);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tab.active {
            color: var(--button-color);
            font-weight: 600;
        }

        .hidden {
            display: none !important;
        }

        .amounts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .amount-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .amount-btn.selected {
            border-color: var(--button-color);
            background-color: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <!-- Главная вкладка -->
        <div id="tab-home" class="view">
            <div class="header">
                <h2>💳 Virtual Cards</h2>
                <span id="username" style="font-size: 14px; color: var(--hint-color);">User</span>
            </div>

            <div class="balance-card">
                <div class="balance-title">Ваш баланс</div>
                <div class="balance-amount" id="user-balance">$0.00</div>
                <button class="btn btn-secondary" onclick="switchTab('deposit')">💎 Пополнить через Tonkeeper</button>
            </div>

            <button class="btn" onclick="buyCard()">💳 Купить карту ($10)</button>
        </div>

        <!-- Вкладка карт -->
        <div id="tab-cards" class="view hidden">
            <div class="section-title">Мои виртуальные карты</div>
            <div id="cards-list">
                <p style="color: var(--hint-color); text-align: center;">У вас пока нет карт</p>
            </div>
        </div>

        <!-- Вкладка пополнения -->
        <div id="tab-deposit" class="view hidden">
            <div class="section-title">Пополнение баланса</div>
            <p style="color: var(--hint-color); font-size: 14px; margin-bottom: 16px;">Выберите сумму пополнения в USDT / USD:</p>
            
            <div class="amounts-grid">
                <div class="amount-btn selected" onclick="selectAmount(10, this)">$10</div>
                <div class="amount-btn" onclick="selectAmount(25, this)">$25</div>
                <div class="amount-btn" onclick="selectAmount(50, this)">$50</div>
            </div>

            <div id="deposit-info" style="background: var(--card-bg); padding: 16px; border-radius: 16px; margin-bottom: 16px;">
                <p style="margin: 0 0 8px 0; font-size: 14px;">К оплате: <strong id="pay-ton">~6.84 TON</strong></p>
                <p style="margin: 0; font-size: 12px; color: var(--hint-color);">Курс: 1 USD = 0.6839 TON</p>
            </div>

            <a id="pay-button" href="#" target="_blank" class="btn">Оплатить в Tonkeeper</a>
        </div>
    </div>

    <!-- Навигация снизу -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('home')">
            <span>🏠</span> Главная
        </button>
        <button class="tab" onclick="switchTab('cards')">
            <span>💳</span> Карты
        </button>
        <button class="tab" onclick="switchTab('deposit')">
            <span>💎</span> Пополнить
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentUserId = tg.initDataUnsafe?.user?.id || "8041683307";
        document.getElementById('username').innerText = tg.initDataUnsafe?.user?.first_name || "Клиент";

        let selectedUsd = 10;
        const tonRate = 0.6839;
        const walletAddress = "UQCrU8nLAToxmsNeTaz8yWm2nHa0hjvbKYIVRxjN";

        function switchTab(tabName) {
            document.querySelectorAll('.view').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');

            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            event?.currentTarget?.classList.add('active');

            if (tabName === 'cards') {
                loadCards();
            }
            if (tabName === 'home') {
                loadProfile();
            }
        }

        function selectAmount(amount, el) {
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            selectedUsd = amount;

            const tonAmount = (amount * tonRate).toFixed(2);
            document.getElementById('pay-ton').innerText = `~${tonAmount} TON`;

            const nanoTon = Math.floor(tonAmount * 1e9);
            const memo = `DEP-${currentUserId}-${Math.random().toString(36).substring(2, 7).toUpperCase()}`;
            const url = `https://app.tonkeeper.com/transfer/${walletAddress}?amount=${nanoTon}&text=${encodeURIComponent(memo)}`;
            document.getElementById('pay-button.href').href = url; // исправление ссылки ниже
        }

        // Инициализация при загрузке
        async function loadProfile() {
            try {
                // Здесь будет запрос к вашему API за балансом
                document.getElementById('user-balance').innerText = "$0.00";
            } catch (e) {}
        }

        async function loadCards() {
            const list = document.getElementById('cards-list');
            list.innerHTML = '<p style="color: var(--hint-color); text-align: center;">Загрузка карт...</p>';
            // Заглушка под вывод купленных карт
            setTimeout(() => {
                list.innerHTML = `
                    <div class="card-item">
                        <div class="card-info"><span>Virtual Visa/Mastercard</span><span>🟢 Активна</span></div>
                        <div class="card-number">4000 3921 8492 1092</div>
                        <div class="card-info"><span>Баланс: $5.00</span><span>CVV: 482</span></div>
                    </div>
                `;
            }, 500);
        }

        function buyCard() {
            tg.showConfirm("Купить виртуальную карту за $10 с вашего баланса?", (confirmed) => {
                if (confirmed) {
                    tg.showAlert("Карта успешно создана!");
                }
            });
        }

        // Первичный расчет ссылки пополнения
        selectAmount(10, document.querySelector('.amount-btn'));
    </script>
</body>
</html>
